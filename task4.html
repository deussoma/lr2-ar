<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Завдання 4 - Іграшки + Hit Test</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.75);
            padding: 10px;
            border-radius: 8px;
            color: white;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            z-index: 10;
            font-size: 11px;
            backdrop-filter: blur(5px);
            /* ВАЖЛИВО: controls не повинні перехоплювати тапи по canvas */
            pointer-events: none;
        }
        /* Але самі кнопки і селекти — повинні реагувати */
        #controls button,
        #controls select,
        #controls input {
            pointer-events: auto;
        }
        button, input, select {
            background: #333;
            color: white;
            border: 1px solid #ccc;
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
        }
        .group {
            background: rgba(0,0,0,0.5);
            padding: 4px 6px;
            border-radius: 6px;
        }
        #start-ar {
            background: #ff5722;
            font-weight: bold;
            pointer-events: auto;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: #333;
            pointer-events: auto;
        }
        /* Підказка під час AR */
        #ar-hint {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            pointer-events: none;
            z-index: 15;
            text-align: center;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="location.href='index.html'">← Назад</button>

    <div id="ar-hint">Наведіть на підлогу і торкніться екрану</div>

    <div id="controls">
        <div class="group">🎨 Матеріал:
            <select id="materialSelect">
                <option value="realistic">Реалістичний</option>
                <option value="gold">Золотий</option>
                <option value="glass">Скляний</option>
                <option value="chrome">Хром</option>
                <option value="glow">Світіння</option>
            </select>
        </div>
        <div class="group">💡 Directional Light: <button id="dirLightToggle">Увімк.</button></div>
        <div class="group">🔆 Інтенсивність:
            <button id="incLight">+</button> <span id="lightIntVal">0.8</span> <button id="decLight">-</button>
        </div>
        <div class="group">🎨 Колір світла: <input type="color" id="lightColor" value="#ffffff"></div>
        <div class="group">🦘 Jump: <button id="jumpToggle">Вимк.</button></div>
        <div class="group">🔄 Rotation: <button id="rotToggle">Увімк.</button></div>
        <button id="start-ar">🚀 START AR</button>
    </div>
    <script type="module" src="src/task4.js"></script>
</body>
</html>
