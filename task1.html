<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Завдання 1 - TorusKnot, Tube, Capsule</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 8px;
            color: white;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            z-index: 10;
            font-size: 12px;
            backdrop-filter: blur(5px);
            font-family: monospace;
        }
        button, select, input {
            background: #333;
            color: white;
            border: 1px solid #fff;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        #start-ar {
            background: #ff5722;
            font-weight: bold;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: #333;
            padding: 8px 15px;
            font-size: 14px;
        }
        label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="location.href='index.html'">← Назад до меню</button>
    <div id="controls">
        <button id="toggleRotate">Обертання: Увімк.</button>
        <button id="randomColor">Випадковий колір</button>
        <button id="toggleTexture">Текстура: Викл.</button>
        <button id="toggleWireframe">Каркас: Викл.</button>
        <label>Швидкість: <input type="range" id="speed" min="0" max="0.03" step="0.001" value="0.015"></label>
        <button id="start-ar">🚀 START AR</button>
    </div>
    <script type="module" src="src/task1.js"></script>
</body>
</html>
